{% extends 'reports/ccsreports.html' %}
{%load static %}
{% block report_content %}
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <td>Numer raportu</td>
                        <td>Nazwa raportu</td>
                        <td>Link</td>
                        			
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Raport potencjalnych napraw do zwolnienia</td>
                        <td>
                            <a href="{% url 'prospective_repairs_to_release_report' %}" class="inline-flex items-center justify-center p-1 hover:bg-slate-100 rounded transition-colors" title="Otwórz raport">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                </svg>
                            </a>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Raportu napraw czekających</td>
                        <td>
                            <a href="{% url 'logistic_waiting_report' %}" class="inline-flex items-center justify-center p-1 hover:bg-slate-100 rounded transition-colors" title="Otwórz raport">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                </svg>
                            </a>
                        </td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Raport dostępnych dostaw XIAOMI</td>
                        <td>
                            <a href="{% url 'deliveries_report' %}" class="inline-flex items-center justify-center p-1 hover:bg-slate-100 rounded transition-colors" title="Otwórz raport">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                </svg>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>				
        </div>
    </div>
</div>
{% endblock %}
