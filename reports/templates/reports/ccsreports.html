{% extends 'main.html' %}

{% block content %}
<div class="space-y-6">
    <!-- Reports Unified Header Card -->
    <div class="bg-white dark:bg-slate-900/60 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm flex items-center justify-between">
        <div>
            <h1 class="text-xl font-extrabold text-slate-900 dark:text-white tracking-tight">{% block report_title %}{{ title|default:"Raport" }}{% endblock %}</h1>
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Dedykowany moduł raportów logistycznych CCS.</p>
        </div>
        <div class="text-xs font-semibold text-indigo-600 dark:text-indigo-400 bg-indigo-500/10 px-3.5 py-1.5 rounded-xl">
            Raporty CCS
        </div>
    </div>

    <!-- Inner Report Content -->
    {% block report_content %}
    {% endblock %}
</div>
{% endblock %}
