{% load static %}
<!doctype html>
<html lang="pl">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="{% static 'images/logo-favicon.png' %}" type="image/png" />
	<!-- Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

	<!-- Tailwind Compiled CSS -->
	<link href="{% static 'css/vrtlogistic.css' %}?{% now 'U' %}" rel="stylesheet">
	<title>Logowanie | Virtual Logistic</title>
</head>

<body class="bg-slate-950 flex items-center justify-center min-h-screen p-4 font-sans antialiased text-slate-200 relative overflow-hidden">
	<!-- Background grid pattern -->
	<div class="absolute inset-0 bg-[linear-gradient(to_right,rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(to_bottom,rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:3rem_3rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)]"></div>

	<!-- Glowing ambient blobs -->
	<div class="absolute top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 w-[350px] h-[350px] bg-indigo-600/10 rounded-full blur-[80px] pointer-events-none"></div>
	<div class="absolute bottom-1/4 right-1/4 translate-x-1/2 translate-y-1/2 w-[350px] h-[350px] bg-blue-600/10 rounded-full blur-[80px] pointer-events-none"></div>

	<!-- Card container -->
	<div class="w-full max-w-md bg-slate-900/85 backdrop-blur-lg border border-slate-800 rounded-2xl shadow-2xl p-8 relative z-10 overflow-hidden">
		<!-- Accent light effect inside the card -->
		<div class="absolute -top-16 -right-16 w-32 h-32 bg-indigo-600/20 rounded-full blur-2xl"></div>
		
		<div class="text-center mb-8 relative">
			<img src="{% static 'images/logo-VL.png' %}" class="mx-auto h-16 w-auto" alt="logo"/>
			<h2 class="text-2xl font-bold text-white mt-4 tracking-tight">Virtual Logistic</h2>
			<p class="text-slate-400 text-sm mt-1">Zaloguj się do systemu logistycznego</p>
		</div>
		
		{% if messages %}
			<div class="space-y-3 mb-6">
				{% for message in messages %}
					<div class="p-4 rounded-xl text-sm font-medium flex items-center gap-3 {% if message.tags == 'success' %}bg-green-500/10 text-green-400 border border-green-500/20{% elif message.tags == 'warning' or message.tags == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20{% else %}bg-blue-500/10 text-blue-400 border border-blue-500/20{% endif %}">
						<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
							{% if message.tags == 'success' %}
								<path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
							{% else %}
								<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
							{% endif %}
						</svg>
						<span>{{ message }}</span>
					</div>
				{% endfor %}
			</div>
		{% endif %}
		
		<form method="POST" class="space-y-6 relative">
			{% csrf_token %}
			<div>
				<label for="inputEmailAddress" class="block text-sm font-semibold text-slate-300 mb-2">Nazwa użytkownika</label>
				<input type="text" class="w-full px-4 py-3 bg-slate-800/80 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" id="inputEmailAddress" placeholder="Wpisz nazwę..." name="username" required>
			</div>
			<div>
				<label for="inputChoosePassword" class="block text-sm font-semibold text-slate-300 mb-2">Hasło</label>
				<div class="relative rounded-xl shadow-sm" id="show_hide_password">
					<input type="password" class="w-full px-4 py-3 bg-slate-800/80 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" name="password" id="inputChoosePassword" placeholder="Wpisz hasło..." required>
					<a href="javascript:;" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-white transition-colors">
						<svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
							<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
						</svg>
					</a>
				</div>
			</div>
			<div class="flex items-center justify-between">
				<label class="flex items-center text-slate-300 text-sm cursor-pointer select-none">
					<input type="checkbox" id="flexSwitchCheckChecked" class="mr-2 h-4 w-4 bg-slate-800 border-slate-700 rounded text-indigo-600 focus:ring-indigo-500 focus:ring-offset-slate-900" checked>
					Zapamiętaj mnie
				</label>
			</div>
			<div>
				<button type="submit" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-slate-900 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2">
					<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
						<path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
					</svg> Zaloguj się
				</button>
			</div>
		</form>
	</div>

	<!-- scripts -->
	<script src="{% static 'js/jquery.min.js' %}"></script>
	<!-- Password show & hide js -->
	<script>
		$(document).ready(function () {
			$("#show_hide_password a").on('click', function (event) {
				event.preventDefault();
				var input = $('#show_hide_password input');
				var svg = $('#eye-icon');
				if (input.attr("type") == "text") {
					input.attr('type', 'password');
					svg.html('<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />');
				} else {
					input.attr('type', 'text');
					svg.html('<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />');
				}
			});
		});
	</script>
</body>

</html>
