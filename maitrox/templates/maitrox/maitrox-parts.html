{% extends 'main.html' %}

{% block content %}
<div class="relative flex py-5 items-center">
    <div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
    <span class="flex-shrink mx-4 text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider">Katalog części</span>
    <div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table id="example2" class="table table-striped table-bordered">
                <thead>
                    <th>Część</th>
                    <th>Opis</th>
                    <th>Magazyn</th>
                </thead>
                <tbody>
                    {%for parts in parts_table%}
                    <tr>
                        <td>{{parts.parts_number}}</td>
                        <td>{{parts.parts_description}}</td>
                        <td>{{parts.warehouse}}</td>
                    </tr>
                    {%endfor%}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
