{% extends 'main.html' %}

{% block content %}
<p align="right">
    <a href="{%url 'maitrox_claims_new'%}">
        <button type="button" class="btn btn-light px-5 radius-30 flex items-center gap-1.5 ml-auto">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg> Nowa reklamacja
        </button>
    </a>
</p>
<hr/>
<h6 align="center" class="mb-0 text-uppercase">Rejestr reklamacji</h6>
<hr/>
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table id="example2" class="table table-striped table-bordered">
                <thead>
                    <th>Część</th>
                    <th>Ilość</th>
                    <th>Status</th>
                    <th>Data</th>
                    <th>Edycja</th>
                    <th>Usuń</th>
                </thead>
                <tbody>
                    {%for claim in claims%}
                    <tr>
                        <td>{{claim.claim_part}}</td>
                        <td>{{claim.qty}}</td>
                        <td><span class="badge {{claim.status}}">{{claim.status}}</span></td>
                        <td>{{claim.date|date:"Y-m-d"}}&nbsp;{{claim.date|time:"H:i"}}</td>
                        <td>
                            <a href="{% url 'maitrox_claims_update' claim.id%}" class="inline-flex items-center justify-center p-1 hover:bg-slate-100 rounded transition-colors" title="Edytuj">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </a>
                        </td>
                        <td>
                            <a href="{% url 'maitrox_claims_delete' claim.id%}" class="inline-flex items-center justify-center p-1 hover:bg-red-50 rounded transition-colors" title="Usuń">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </a>
                        </td>
                    </tr>
                    {%endfor%}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
