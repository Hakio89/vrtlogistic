{% extends 'main.html' %}

{% block content %}
{% if not all_waiting %}
<p align="right">
    <a href="{% url 'maitrox_waiting_new' %}">
        <button type="button" class="btn btn-light px-5 radius-30 flex items-center gap-1.5 ml-auto">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg> Dodaj plik
        </button>
    </a>
</p>
{% endif %}
<hr/>
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table id="example2" class="table table-striped table-bordered">
                <thead>
                    <th>Pliki czekających</th>
                    <th>Data wgrania</th>
                    <th>Podgląd</th>
                    <th>Plik</th>         
                </thead>
                <tbody>
                    {% for waits in all_waiting %}
                    <tr>
                        <td>{{waits.waiting_parts}}</td>
                        <td>{{waits.date|date:"Y-m-d"}}&nbsp;{{waits.date|time:"H:i"}}</td>
                        <td>
                            <a href="{% url 'maitrox_waiting' %}" class="inline-flex items-center justify-center p-1 hover:bg-slate-100 rounded transition-colors" title="Podgląd">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </a>
                        </td>
                        <td>
                            <a href="{% url 'maitrox_waiting_update' waits.id %}" class="inline-flex items-center justify-center p-1 hover:bg-slate-100 rounded transition-colors" title="Edytuj plik">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
